<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MarketPairs | Trade Global Markets</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(145deg, #0a1a2f 0%, #0c1e2e 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(8px);
            border-radius: 48px;
            padding: 40px 24px 48px;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF 0%, #D4E6FF 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .tagline {
            font-size: 1.2rem;
            color: #B3D4FF;
            margin-bottom: 32px;
            font-weight: 500;
        }

        .btn {
            display: block;
            width: 100%;
            background: linear-gradient(90deg, #00C853 0%, #00A86B 100%);
            border: none;
            padding: 18px 20px;
            font-size: 1.6rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            border-radius: 60px;
            margin: 20px 0 28px;
            transition: transform 0.1s ease, box-shadow 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,200,80,0.3);
            text-align: center;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: scale(0.97);
            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
        }

        .trust-badge {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 32px 0 20px;
            flex-wrap: wrap;
        }

        .badge {
            font-size: 0.8rem;
            color: #AAC7E8;
            background: rgba(255,255,255,0.08);
            padding: 6px 14px;
            border-radius: 40px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .badge::before {
            content: "✓";
            font-weight: bold;
            font-size: 1rem;
            color: #00E676;
        }

        .small-note {
            font-size: 0.7rem;
            color: #6C8FB0;
            line-height: 1.4;
            margin-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px;
        }

        .small-note a {
            color: #8AB3E0;
            text-decoration: none;
        }

        /* Mobile tweaks */
        @media (max-width: 480px) {
            .container {
                padding: 30px 20px 40px;
            }
            h1 {
                font-size: 1.9rem;
            }
            .tagline {
                font-size: 1rem;
            }
            .btn {
                font-size: 1.4rem;
                padding: 16px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>MarketPairs</h1>
        <div class="tagline">Global markets. One simple account.</div>

        <!-- SINGLE BIG BUTTON -->
        <a href="#" id="registerBtn" class="btn">Start Trading →</a>

        <div class="trust-badge">
            <span class="badge">SSL Secure</span>
            <span class="badge">24/7 Support</span>
            <span class="badge">Fast withdrawal</span>
        </div>

        <div class="small-note">
            ⚡ 2-min registration • <span id="partnerHint">Redirecting to our secure partner</span><br>
            Trading involves risk. Only trade what you can lose.
        </div>
    </div>

    <script>
        // 🔁 ========== CHANGE THIS LINK TO YOUR DERIV REGISTRATION URL ==========
        // Paste your Deriv registration / affiliate link below (without any tracking params that break rules)
        const DERIV_REG_URL = "https://deriv.com/registration/";   // <---- REPLACE WITH YOUR REAL LINK
        
        // Optional: add a tiny delay or just direct redirect
        const btn = document.getElementById('registerBtn');
        btn.addEventListener('click', function(e) {
            e.preventDefault();
            // Optional: show "Redirecting..." text
            btn.textContent = "Redirecting...";
            btn.style.opacity = "0.7";
            setTimeout(() => {
                window.location.href = DERIV_REG_URL;
            }, 100);
        });
        
        // (Optional) dynamic partner hint - no brand name on landing page
        // Keep generic as required
    </script>
</body>
</html>
